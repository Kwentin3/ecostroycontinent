services:
  # Canonical phase-1 runtime shape lives on the Linux VM.
  # This compose file describes the server runtime surface, not a second
  # SQL truth to be recreated on the Windows operator workstation.
  app:
    # App runtime env is injected from /opt/ecostroycontinent/runtime/.env via
    # docker compose --env-file on the server. Do not inject backup env here.
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      sql:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_GEMINI_API_KEY: ${LLM_GEMINI_API_KEY}
      LLM_GEMINI_BASE_URL: ${LLM_GEMINI_BASE_URL}
      LLM_SOCKS5_ENABLED: ${LLM_SOCKS5_ENABLED}
      LLM_SOCKS5_HOST: ${LLM_SOCKS5_HOST}
      LLM_SOCKS5_PORT: ${LLM_SOCKS5_PORT}
      LLM_SOCKS5_USERNAME: ${LLM_SOCKS5_USERNAME}
      LLM_SOCKS5_PASSWORD: ${LLM_SOCKS5_PASSWORD}
      MEDIA_STORAGE_MODE: ${MEDIA_STORAGE_MODE}
      MEDIA_STORAGE_DIR: ${MEDIA_STORAGE_DIR}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET}
      MEDIA_S3_REGION: ${MEDIA_S3_REGION}
      MEDIA_S3_ENDPOINT_URL: ${MEDIA_S3_ENDPOINT_URL}
      MEDIA_S3_ACCESS_KEY_ID: ${MEDIA_S3_ACCESS_KEY_ID}
      MEDIA_S3_SECRET_ACCESS_KEY: ${MEDIA_S3_SECRET_ACCESS_KEY}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL}
      BOOTSTRAP_SUPERADMIN_USERNAME: ${BOOTSTRAP_SUPERADMIN_USERNAME}
      BOOTSTRAP_SUPERADMIN_DISPLAY_NAME: ${BOOTSTRAP_SUPERADMIN_DISPLAY_NAME}
      BOOTSTRAP_SUPERADMIN_ACCESS_TOKEN: ${BOOTSTRAP_SUPERADMIN_ACCESS_TOKEN}
    ports:
      - "127.0.0.1:${PORT}:3000"

  sql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sql_data:
