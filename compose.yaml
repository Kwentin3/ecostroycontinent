services:
  # Canonical phase-1 runtime shape lives on the Linux VM.
  # This compose file describes the server runtime surface, not a second
  # SQL truth to be recreated on the Windows operator workstation.
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      sql:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      BOOTSTRAP_SUPERADMIN_USERNAME: ${BOOTSTRAP_SUPERADMIN_USERNAME}
      BOOTSTRAP_SUPERADMIN_DISPLAY_NAME: ${BOOTSTRAP_SUPERADMIN_DISPLAY_NAME}
      BOOTSTRAP_SUPERADMIN_ACCESS_TOKEN: ${BOOTSTRAP_SUPERADMIN_ACCESS_TOKEN}
    ports:
      - "127.0.0.1:${PORT}:3000"

  sql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sql_data:
