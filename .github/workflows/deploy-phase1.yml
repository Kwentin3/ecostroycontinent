name: deploy-phase1

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Pinned GHCR image reference to write into /opt/ecostroycontinent/runtime/.env
        required: true
        type: string
      run_live_removal_acceptance:
        description: Run the live removal sweep acceptance harness after deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, ecostroycontinent-phase1]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify host env file
        run: |
          test -f /opt/ecostroycontinent/runtime/.env
          test -r /opt/ecostroycontinent/runtime/.env
          test -f /opt/ecostroycontinent/runtime/app-image.env
          test -w /opt/ecostroycontinent/runtime/app-image.env

      - name: Refresh runner-managed image pin from dispatched image ref
        run: |
          image_ref='${{ inputs.image_ref }}'
          case "$image_ref" in
            ghcr.io/kwentin3/ecostroycontinent-app@sha256:*)
              ;;
            *)
              echo "image_ref must be a pinned ghcr.io/kwentin3/ecostroycontinent-app@sha256:... reference"
              exit 1
              ;;
          esac

          printf 'APP_IMAGE=%s\n' "$image_ref" > /opt/ecostroycontinent/runtime/app-image.env

      - name: Pull and refresh app runtime
        run: |
          image_ref='${{ inputs.image_ref }}'
          export APP_IMAGE="$image_ref"
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --env-file /opt/ecostroycontinent/runtime/app-image.env \
            --project-name repo \
            -f compose.yaml \
            pull app
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --env-file /opt/ecostroycontinent/runtime/app-image.env \
            --project-name repo \
            -f compose.yaml \
            up -d sql
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --env-file /opt/ecostroycontinent/runtime/app-image.env \
            --project-name repo \
            -f compose.yaml \
            run --rm --no-deps app npm run db:migrate
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --env-file /opt/ecostroycontinent/runtime/app-image.env \
            --project-name repo \
            -f compose.yaml \
            up -d --remove-orphans

      - name: Confirm deployed image pin
        run: |
          image_ref='${{ inputs.image_ref }}'
          export APP_IMAGE="$image_ref"
          echo "Resolved APP_IMAGE from runner-managed pin file:"
          grep '^APP_IMAGE=' /opt/ecostroycontinent/runtime/app-image.env
          echo "Shell APP_IMAGE override:"
          printf '%s\n' "$APP_IMAGE"
          echo "Compose-resolved images:"
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --env-file /opt/ecostroycontinent/runtime/app-image.env \
            --project-name repo \
            -f compose.yaml \
            config --images
          echo "Running app container image:"
          docker inspect repo-app-1 --format '{{.Image}}'

      - name: Health probe through Traefik
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -ksSf https://127.0.0.1/api/health -H "Host: ecostroycontinent.ru"; then
              exit 0
            fi
            sleep 3
          done
          curl -ksSf https://127.0.0.1/api/health -H "Host: ecostroycontinent.ru"

      - name: Prepare temporary operator for live acceptance
        if: ${{ inputs.run_live_removal_acceptance }}
        run: |
          set -a
          . /opt/ecostroycontinent/runtime/.env
          set +a

          prefix="test_removal_live_${GITHUB_RUN_ID}"
          user_id="user_${prefix}"
          username="test_removal_ops_${GITHUB_RUN_ID}"
          password="$(docker exec repo-app-1 node -e "console.log(require('node:crypto').randomBytes(18).toString('base64url'))")"
          password_hash="$(docker exec repo-app-1 node --input-type=module -e "import { hashPassword } from './lib/auth/password.js'; console.log(hashPassword(process.argv[1]));" "$password")"

          echo "::add-mask::$password"
          echo "::add-mask::$password_hash"

          printf 'TEST_ACCEPTANCE_PREFIX=%s\n' "$prefix" >> "$GITHUB_ENV"
          printf 'TEST_ACCEPTANCE_USER_ID=%s\n' "$user_id" >> "$GITHUB_ENV"
          printf 'TEST_ACCEPTANCE_USERNAME=%s\n' "$username" >> "$GITHUB_ENV"
          printf 'TEST_ACCEPTANCE_PASSWORD=%s\n' "$password" >> "$GITHUB_ENV"
          printf 'TEST_ACCEPTANCE_PASSWORD_HASH=%s\n' "$password_hash" >> "$GITHUB_ENV"
          printf 'LIVE_APP_BASE_URL=%s\n' "$APP_BASE_URL" >> "$GITHUB_ENV"

      - name: Insert temporary operator into live DB
        if: ${{ inputs.run_live_removal_acceptance }}
        run: |
          docker exec repo-sql-1 sh -lc "psql -v ON_ERROR_STOP=1 -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"INSERT INTO app_users (id, username, display_name, role, password_hash, active) VALUES ('${TEST_ACCEPTANCE_USER_ID}', '${TEST_ACCEPTANCE_USERNAME}', 'Live Removal Acceptance', 'superadmin', '${TEST_ACCEPTANCE_PASSWORD_HASH}', TRUE);\""

      - name: Run live removal sweep acceptance
        if: ${{ inputs.run_live_removal_acceptance }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            -e APP_BASE_URL="$LIVE_APP_BASE_URL" \
            -e TEST_ACCEPTANCE_USERNAME="$TEST_ACCEPTANCE_USERNAME" \
            -e TEST_ACCEPTANCE_PASSWORD="$TEST_ACCEPTANCE_PASSWORD" \
            -e TEST_ACCEPTANCE_PREFIX="$TEST_ACCEPTANCE_PREFIX" \
            -e OUTPUT_FILE=/work/.live-removal-sweep-acceptance-report.json \
            node:22-alpine \
            node scripts/live-removal-sweep-acceptance.mjs

      - name: Fallback cleanup for prefixed test data
        if: ${{ always() && inputs.run_live_removal_acceptance }}
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/.live-removal-sweep-acceptance-report.json" ]; then
            exit 0
          fi

          mapfile -t entity_ids < <(
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/work" \
              -w /work \
              node:22-alpine \
              node -e 'const fs = require("node:fs"); const reportPath = "/work/.live-removal-sweep-acceptance-report.json"; if (!fs.existsSync(reportPath)) { process.exit(0); } const report = JSON.parse(fs.readFileSync(reportPath, "utf8")); for (const id of Object.values(report.created || {}).map((item) => item && item.id).filter(Boolean)) { console.log(id); }'
          )

          if [ "${#entity_ids[@]}" -eq 0 ]; then
            exit 0
          fi

          cleanup_cmd=(docker exec repo-app-1 node /app/scripts/cleanup-test-data.mjs --confirm --allow-referenced --exact-entity-ids --json)

          for entity_id in "${entity_ids[@]}"; do
            cleanup_cmd+=(--entity-id "$entity_id")
          done

          "${cleanup_cmd[@]}" || true

      - name: Remove temporary operator
        if: ${{ always() && inputs.run_live_removal_acceptance }}
        run: |
          docker exec repo-sql-1 sh -lc "psql -v ON_ERROR_STOP=1 -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"DELETE FROM app_users WHERE id = '${TEST_ACCEPTANCE_USER_ID}' OR username = '${TEST_ACCEPTANCE_USERNAME}';\""
