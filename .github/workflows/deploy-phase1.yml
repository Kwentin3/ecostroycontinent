name: deploy-phase1

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Pinned GHCR image reference to write into /opt/ecostroycontinent/runtime/.env
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, ecostroycontinent-phase1]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify host env file
        run: test -f /opt/ecostroycontinent/runtime/.env

      - name: Refresh host image pin from dispatched image ref
        run: |
          image_ref='${{ inputs.image_ref }}'
          case "$image_ref" in
            ghcr.io/kwentin3/ecostroycontinent-app@sha256:*)
              ;;
            *)
              echo "image_ref must be a pinned ghcr.io/kwentin3/ecostroycontinent-app@sha256:... reference"
              exit 1
              ;;
          esac

          env_file=/opt/ecostroycontinent/runtime/.env
          temp_file="$(mktemp)"

          awk -v image_ref="$image_ref" '
            BEGIN { updated = 0 }
            /^APP_IMAGE=/ {
              print "APP_IMAGE=" image_ref
              updated = 1
              next
            }
            { print }
            END {
              if (!updated) {
                print "APP_IMAGE=" image_ref
              }
            }
          ' "$env_file" > "$temp_file"

          install -m 600 "$temp_file" "$env_file"
          rm -f "$temp_file"

      - name: Pull and refresh app runtime
        run: |
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --project-name repo \
            -f compose.yaml \
            pull app
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --project-name repo \
            -f compose.yaml \
            up -d --remove-orphans

      - name: Health probe through Traefik
        run: |
          curl -ksSf https://127.0.0.1/api/health -H "Host: ecostroycontinent.ru"
