name: deploy-phase1

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Pinned GHCR image reference to write into /opt/ecostroycontinent/runtime/.env
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, ecostroycontinent-phase1]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify host env file
        run: test -f /opt/ecostroycontinent/runtime/.env

      - name: Refresh host image pin from dispatched image ref
        run: |
          image_ref='${{ inputs.image_ref }}'
          case "$image_ref" in
            ghcr.io/kwentin3/ecostroycontinent-app@sha256:*)
              ;;
            *)
              echo "image_ref must be a pinned ghcr.io/kwentin3/ecostroycontinent-app@sha256:... reference"
              exit 1
              ;;
          esac

          docker run --rm \
            -e IMAGE_REF="$image_ref" \
            -v /opt/ecostroycontinent/runtime:/runtime \
            busybox:1.36 sh -s <<'EOF'
          set -eu
          env_file=/runtime/.env
          temp_file="$(mktemp /runtime/.env.tmp.XXXXXX)"

          awk -v image_ref="$IMAGE_REF" '
            BEGIN { updated = 0 }
            /^APP_IMAGE=/ {
              print "APP_IMAGE=" image_ref
              updated = 1
              next
            }
            { print }
            END {
              if (!updated) {
                print "APP_IMAGE=" image_ref
              }
            }
          ' "$env_file" > "$temp_file"

          chmod 600 "$temp_file"
          mv "$temp_file" "$env_file"
          EOF

      - name: Pull and refresh app runtime
        run: |
          image_ref='${{ inputs.image_ref }}'
          export APP_IMAGE="$image_ref"
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --project-name repo \
            -f compose.yaml \
            pull app
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --project-name repo \
            -f compose.yaml \
            up -d --remove-orphans

      - name: Confirm deployed image pin
        run: |
          image_ref='${{ inputs.image_ref }}'
          export APP_IMAGE="$image_ref"
          echo "Resolved APP_IMAGE from runtime env:"
          grep '^APP_IMAGE=' /opt/ecostroycontinent/runtime/.env
          echo "Shell APP_IMAGE override:"
          printf '%s\n' "$APP_IMAGE"
          echo "Compose-resolved images:"
          docker compose \
            --env-file /opt/ecostroycontinent/runtime/.env \
            --project-name repo \
            -f compose.yaml \
            config --images
          echo "Running app container image:"
          docker inspect repo-app-1 --format '{{.Image}}'

      - name: Health probe through Traefik
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -ksSf https://127.0.0.1/api/health -H "Host: ecostroycontinent.ru"; then
              exit 0
            fi
            sleep 3
          done
          curl -ksSf https://127.0.0.1/api/health -H "Host: ecostroycontinent.ru"
